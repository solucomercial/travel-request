services:
  postgres:
    image: postgres:16-alpine
    container_name: travel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travel_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: travel_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: travel_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mailpit
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/travel_db
      JWT_ACCESS_SECRET: dev-access-secret-dev-access-secret-1234
      JWT_REFRESH_SECRET: dev-refresh-secret-dev-refresh-secret-1234
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      COOKIE_SECURE: false
      CORPORATE_DOMAIN: solucoesterceirizadas.com.br
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: "onboarding@solucoesterceirizadas.com.br"
      SMTP_PASS: "Solucoes@2026*"
      EMAIL_FROM: onboarding@solucoesterceirizadas.com.br
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3333:3333"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    ports:
      - "3000:3000"

volumes:
  postgres_data:
